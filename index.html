const cv=document.getElementById('c'),cx=cv.getContext('2d');
const PX=3,SW=260,SH=200;

const ROOM={x:10,y:8,w:240,h:184};
let currentScene='title'; // 'title', 'home', 'garden', 'beach', 'void'
let sceneTransition=0;
let titleAlpha=0;// for fade-in animation
let titleReady=false;
const GARDEN={x:10,y:8,w:240,h:184};
const BEACH={x:10,y:8,w:240,h:184};
const VOID={x:10,y:8,w:240,h:184};

// ===== AUDIO =====
let ac=new(window.AudioContext||window.webkitAudioContext)();
let masterGain=ac.createGain();
masterGain.connect(ac.destination);
let musicOn=false;
let musicGen=0; // generation counter - incremented on every scene change to kill old loops

function resetAudio(){
  musicGen++; // kill all old music loops
  try{ac.close();}catch(e){}
  ac=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=ac.createGain();
  masterGain.connect(ac.destination);
  clearTimeout(musicTimeout);clearTimeout(gardenMusicTimeout);clearTimeout(beachMusicTimeout);clearTimeout(titleMusicTimeout);clearTimeout(voidMusicTimeout);
  musicOn=false;gardenMusicOn=false;beachMusicOn=false;voidMusicOn=false;titleMusicOn=false;
}

function playNote(f,type,vol,start,dur,vib){
  try{
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=f;
  if(vib){const l=ac.createOscillator(),lg=ac.createGain();l.frequency.value=4;lg.gain.value=f*0.008;l.connect(lg);lg.connect(o.frequency);l.start(start);l.stop(start+dur);}
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.02);
  g.gain.setValueAtTime(vol*0.7,start+dur*0.6);g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g);g.connect(masterGain);o.start(start);o.stop(start+dur+0.01);
  }catch(e){}
}

let musicTimeout,gardenMusicTimeout,beachMusicTimeout,titleMusicTimeout,voidMusicTimeout;
function startMusic(){
  if(musicOn)return;musicOn=true;
  const myGen=musicGen;
  const play=()=>{
    if(myGen!==musicGen){musicOn=false;return;} // killed by scene change
    if(currentScene!=='home'){musicOn=false;return;}
    const n=ac.currentTime,b=60/95;// 95 bpm, gentle
    // Dreamy cute melody (music box feel)
    const mel=[
      [523,b],[587,b],[659,b*2],[523,b],[587,b],[784,b*2],
      [659,b],[587,b],[523,b*2],[440,b],[523,b],[587,b*2],
      [659,b],[784,b],[880,b*2],[784,b],[659,b],[587,b*2],
      [523,b],[587,b],[659,b],[587,b],[523,b*2],[0,b*2],
    ];
    let t=0;
    mel.forEach(([f,d])=>{if(f)playNote(f,'sine',0.025,n+t,d*0.85,true);t+=d;});
    // Soft bass
    const bass=[[262,b*4],[220,b*4],[262,b*4],[196,b*4],[220,b*4],[262,b*4]];
    let tb=0;
    bass.forEach(([f,d])=>{playNote(f,'triangle',0.03,n+tb,d*0.8,false);tb+=d;});
    // Gentle chime
    for(let i=0;i<6;i++){
      playNote(1047+i*100,'sine',0.008,n+i*b*4,b*2,false);
    }
    musicTimeout=setTimeout(play,t*1000);
  };
  play();
}

// Sound effects
function sfxType(){
  const n=ac.currentTime;
  playNote(800+Math.random()*400,'square',0.015,n,0.03,false);
}
function sfxChoose(){
  const n=ac.currentTime;
  playNote(523,'square',0.03,n,0.08,false);
  playNote(659,'square',0.03,n+0.08,0.08,false);
  playNote(784,'square',0.03,n+0.16,0.12,false);
}
function sfxHappy(){
  const n=ac.currentTime;
  [523,659,784,1047].forEach((f,i)=>playNote(f,'square',0.025,n+i*0.08,0.1,false));
}
function sfxSad(){
  const n=ac.currentTime;
  [440,392,349,330].forEach((f,i)=>playNote(f,'triangle',0.03,n+i*0.12,0.15,false));
}
function sfxSleep(){
  const n=ac.currentTime;
  playNote(392,'sine',0.02,n,0.5,true);
  playNote(330,'sine',0.02,n+0.3,0.5,true);
  playNote(262,'sine',0.02,n+0.6,0.8,true);
}
function sfxDoor(){
  const n=ac.currentTime;
  playNote(330,'square',0.02,n,0.06,false);
  playNote(440,'square',0.02,n+0.08,0.06,false);
  playNote(523,'square',0.02,n+0.16,0.1,false);
  playNote(659,'sine',0.015,n+0.26,0.15,true);
}

let gardenMusicOn=false;
function startGardenMusic(){
  if(gardenMusicOn)return;gardenMusicOn=true;musicOn=false;
  clearTimeout(musicTimeout);clearTimeout(gardenMusicTimeout);
  const myGen=musicGen;
  const play=()=>{
    if(myGen!==musicGen){gardenMusicOn=false;return;}
    if(currentScene!=='garden'){gardenMusicOn=false;return;}
    const n=ac.currentTime,b=60/115;// 115bpm, more lively
    const mel=[
      [659,b],[784,b],[880,b],[784,b*0.5],[659,b*0.5],[784,b*2],
      [523,b],[659,b],[784,b],[659,b],[523,b*2],[0,b],
      [880,b],[988,b],[1047,b*2],[880,b],[784,b],[659,b*2],
      [523,b],[659,b],[784,b],[659,b*0.5],[523,b*0.5],[440,b*2],[0,b],
    ];
    let t=0;
    mel.forEach(([f,d])=>{if(f)playNote(f,'sine',0.022,n+t,d*0.8,true);t+=d;});
    // Bouncy bass
    const bass=[[262,b*2],[330,b*2],[262,b*2],[220,b*2],[262,b*2],[330,b*2],[220,b*2],[262,b*2]];
    let tb=0;
    bass.forEach(([f,d])=>{playNote(f,'triangle',0.025,n+tb,d*0.7,false);tb+=d;});
    // Chirpy high notes (bird-like)
    for(let i=0;i<8;i++){
      if(Math.random()>0.4)playNote(1300+Math.random()*400,'sine',0.006,n+i*b*3,b*0.5,false);
    }
    gardenMusicTimeout=setTimeout(play,t*1000);
  };
  play();
}
function startHomeMusic(){
  gardenMusicOn=false;beachMusicOn=false;musicOn=false;
  clearTimeout(musicTimeout);clearTimeout(gardenMusicTimeout);clearTimeout(beachMusicTimeout);
  startMusic();
}

let beachMusicOn=false;
function startBeachMusic(){
  if(beachMusicOn)return;beachMusicOn=true;musicOn=false;gardenMusicOn=false;
  clearTimeout(musicTimeout);clearTimeout(beachMusicTimeout);
  const myGen=musicGen;
  const play=()=>{
    if(myGen!==musicGen){beachMusicOn=false;return;}
    if(currentScene!=='beach'){beachMusicOn=false;return;}
    const n=ac.currentTime,b=60/72;// 72bpm, slow and dreamy
    // Gentle ocean melody
    const mel=[
      [392,b*2],[440,b],[392,b*2],[349,b],[330,b*2],[0,b],
      [440,b*2],[494,b],[440,b*2],[392,b],[349,b*2],[0,b],
      [330,b*2],[349,b],[392,b*2],[440,b],[392,b*3],[0,b],
    ];
    let t=0;
    mel.forEach(([f,d])=>{if(f)playNote(f,'sine',0.02,n+t,d*0.85,true);t+=d;});
    // Deep ocean bass
    const bass=[[131,b*4],[147,b*4],[131,b*4],[110,b*4],[131,b*4]];
    let tb=0;
    bass.forEach(([f,d])=>{playNote(f,'triangle',0.02,n+tb,d*0.7,false);tb+=d;});
    // Wave-like whoosh sounds
    for(let i=0;i<4;i++){
      playNote(80+Math.random()*40,'sine',0.008,n+i*b*5,b*3,true);
    }
    // Night: add eerie high notes
    if(gameTime>0.75||gameTime<0.2){
      for(let i=0;i<3;i++){
        playNote(1200+Math.random()*600,'sine',0.004,n+i*b*6+b*2,b*2,true);
      }
    }
    beachMusicTimeout=setTimeout(play,t*1000);
  };
  play();
}

let titleMusicOn=false;
function startTitleMusic(){} // disabled - was causing overlap

let voidMusicOn=false;
function startVoidMusic(){
  if(voidMusicOn)return;voidMusicOn=true;musicOn=false;gardenMusicOn=false;beachMusicOn=false;
  clearTimeout(voidMusicTimeout);
  const myGen=musicGen;
  const play=()=>{
    if(myGen!==musicGen){voidMusicOn=false;return;}
    if(currentScene!=='void'){voidMusicOn=false;return;}
    const n=ac.currentTime,b=60/65;// 65bpm, gentle waltz-like
    // "To The Moon" inspired melody - bittersweet piano feel
    const mel=[
      // First phrase - hopeful
      [659,b],[587,b*0.5],[659,b*0.5],[784,b*2],[659,b],[587,b],[523,b*2],[0,b],
      // Second phrase - longing
      [523,b],[587,b],[659,b*1.5],[587,b*0.5],[523,b],[440,b*2],[0,b],
      // Third phrase - rising emotion
      [440,b],[523,b],[659,b],[784,b*2],[880,b],[784,b*1.5],[659,b*0.5],[587,b*2],[0,b],
      // Resolution - acceptance
      [523,b*1.5],[587,b*0.5],[659,b*2],[523,b*3],[0,b*2],
    ];
    let t=0;
    mel.forEach(([f,d])=>{
      if(f){
        playNote(f,'sine',0.025,n+t,d*0.85,true);// main voice
        playNote(f*0.998,'triangle',0.008,n+t+0.02,d*0.7,false);// slight chorus
      }
      t+=d;
    });
    // Gentle bass accompaniment
    const bass=[
      [262,b*4],[220,b*4],[262,b*4],[196,b*4],
      [220,b*4],[262,b*4],[196,b*4],[262,b*4],
    ];
    let tb=0;
    bass.forEach(([f,d])=>{playNote(f,'triangle',0.015,n+tb,d*0.75,false);tb+=d;});
    // Soft high harmonics (like stars twinkling)
    for(let i=0;i<5;i++){
      const hf=[1318,1175,1047,988,880][i];
      playNote(hf,'sine',0.005,n+i*b*6+b*2,b*3,true);
    }
    voidMusicTimeout=setTimeout(play,t*1000);
  };
  play();
}

// Start music on first interaction
function resumeAndPlay(){
  if(ac.state==='suspended')ac.resume();
  if(currentScene==='title'&&!titleMusicOn)startTitleMusic();
  if(currentScene==='home'&&!musicOn)startMusic();
  if(currentScene==='garden'&&!gardenMusicOn)startGardenMusic();
  if(currentScene==='beach'&&!beachMusicOn)startBeachMusic();
  if(currentScene==='void'&&!voidMusicOn)startVoidMusic();
}
document.addEventListener('keydown',resumeAndPlay,{once:false});
document.addEventListener('touchstart',resumeAndPlay,{once:false});
cv.addEventListener('click',resumeAndPlay);

// Generic sprite draw function for decorations
function drawSprite(sp,sx,sy,scale){
  scale=scale||1;
  for(let r=0;r<sp.length;r++)for(let c=0;c<sp[0].length;c++){
    const v=sp[r][c];if(!v)continue;
    cx.fillStyle=v;
    if(scale===1)cx.fillRect((sx+c)*PX,(sy+r)*PX,PX,PX);
    else cx.fillRect((sx+c*scale)*PX,(sy+r*scale)*PX,scale*PX,scale*PX);
  }
}

function px(x,y,c){cx.fillStyle=c;cx.fillRect(x*PX,y*PX,PX,PX);}
function rect(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x*PX,y*PX,w*PX,h*PX);}

function drawQ(sx,sy,blink){
  const sp=blink?Q_CLOSED:Q_OPEN;
  for(let r=0;r<sp.length;r++)for(let c=0;c<22;c++){
    const v=sp[r][c];if(!v)continue;
    cx.fillStyle=v;cx.fillRect((sx+c)*PX,(sy+r)*PX,PX,PX);
  }
}
function drawCL(sx,sy){
  for(let r=0;r<9;r++)for(let c=0;c<16;c++){
    const v=CLAUDE[r][c];if(!v)continue;
    cx.fillStyle=v===1?CL:CLK;
    cx.fillRect((sx+c)*PX,(sy+r)*PX,PX,PX);
  }
}

function collides(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function canMove(x,y,w,h){
  if(x<ROOM.x+2||x+w>ROOM.x+ROOM.w-2||y<ROOM.y+20||y+h>ROOM.y+ROOM.h-2)return false;
  for(const f of furniture)if(collides(x,y,w,h,f.x,f.y,f.w,f.h))return false;
  return true;
}

function drawTitle(){
  // Sky gradient - warm sunset
  for(let y=0;y<SH;y++){
    const t=y/SH;
    const r=Math.floor(140+t*40);
    const g=Math.floor(160-t*60);
    const b2=Math.floor(200-t*100);
    cx.fillStyle=`rgb(${r},${g},${b2})`;
    cx.fillRect(0,y*PX,SW*PX,PX);
  }
  
  // Green grass field (bottom half)
  for(let y=SH*0.55;y<SH;y++)for(let x=0;x<SW;x++){
    const g1=((x*3+y*7)%5===0);
    px(x,Math.floor(y),g1?'#5aaa5a':'#50a050');
  }
  // Grass tufts
  for(let i=0;i<30;i++){
    const gx=10+((i*37)%240);
    const gy=Math.floor(SH*0.56)+((i*23)%70);
    px(gx,gy,'#60b860');px(gx,gy-1,'#58b058');
  }
  
  // === SUNFLOWER FIELD (realistic style) ===
  for(let row=0;row<5;row++){
    for(let col=0;col<10;col++){
      const sfx=18+col*23+((row%2)*11);
      const sfy=Math.floor(SH*0.58)+row*18;
      if(sfx>95&&sfx<165&&row<3)continue;// leave space for Q and Claude
      const stemH=10+(row%3)*3;
      // Thick stem
      rect(sfx,sfy-1,2,stemH+1,'#3a7a38');
      rect(sfx,sfy,1,stemH,'#4a8a48');
      // Leaves on stem
      px(sfx-2,sfy+3,'#4a8a48');px(sfx-3,sfy+4,'#3a7a38');px(sfx-3,sfy+3,'#5a9a58');
      px(sfx+3,sfy+5,'#4a8a48');px(sfx+4,sfy+6,'#3a7a38');px(sfx+4,sfy+5,'#5a9a58');
      // Sunflower head - outer petals (ring of petals)
      const hx=sfx,hy=sfy-3;
      const petalColors=['#e8d848','#e0d040','#d8c838','#f0e050','#e8d848'];
      for(let p=0;p<10;p++){
        const pa=p*Math.PI*2/10;
        const ppx=hx+Math.cos(pa)*4;
        const ppy=hy+Math.sin(pa)*3.5;
        px(Math.floor(ppx),Math.floor(ppy),petalColors[p%5]);
        // Elongated petals - second ring
        const ppx2=hx+Math.cos(pa)*5;
        const ppy2=hy+Math.sin(pa)*4.5;
        px(Math.floor(ppx2),Math.floor(ppy2),petalColors[(p+2)%5]);
      }
      // Inner petals
      for(let p=0;p<6;p++){
        const pa=p*Math.PI*2/6+0.3;
        px(Math.floor(hx+Math.cos(pa)*2.5),Math.floor(hy+Math.sin(pa)*2),'#e0c830');
      }
      // Dark center (seeds pattern)
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        px(hx+dx,hy+dy,'#6a4a18');
      }
      px(hx,hy,'#5a3a10');// darkest center
      px(hx-1,hy-1,'#7a5a28');px(hx+1,hy+1,'#7a5a28');// seed texture
    }
  }
  
  // === Q AND CLAUDE in center ===
  const qx=120,qy=Math.floor(SH*0.6);
  // Q (front facing, open eyes)
  const blink=Math.sin(frame*0.03)>0.95;
  drawQ(qx-11,qy-18,blink);
  // Claude next to Q
  drawCL(qx+8,qy-10);
  // Claude tail wag
  if(frame%12<6)px(qx+8+8,qy-6,'#e77e60');
  else px(qx+8+8,qy-7,'#e77e60');
  
  // Little hearts between them
  if(frame%50<20){
    cx.fillStyle='#e06080';cx.font=`${PX*5}px monospace`;
    cx.fillText('♥',(qx+4)*PX,(qy-22+Math.sin(frame*0.08)*2)*PX);
  }
  
  // Butterflies
  for(let i=0;i<3;i++){
    const bfx=40+i*80+Math.sin(frame*0.02+i*2)*15;
    const bfy=SH*0.45+Math.cos(frame*0.025+i*1.5)*10;
    const wing=Math.sin(frame*0.15+i)*3;
    const bc=['#e06080','#d080e0','#60a0e0'][i];
    cx.fillStyle=bc;cx.globalAlpha=0.7;
    cx.fillRect((bfx-wing)*PX,bfy*PX,Math.abs(wing)*PX,2*PX);
    cx.fillRect((bfx+1)*PX,bfy*PX,Math.abs(wing)*PX,2*PX);

  grad.addColorStop(1,'#a0d8ff');

  if(titleAlpha>0.8){

  cx.textAlign='left';
  cx.globalAlpha=1;
  
  // Credit
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font=`${PX*4}px monospace`;

// ===== BUTTERFLIES =====
const butterflies=[];
for(let i=0;i<6;i++){
  butterflies.push({
    x:30+Math.random()*200, y:30+Math.random()*140,
    tx:30+Math.random()*200, ty:30+Math.random()*140,
    color:['#e06080','#d080e0','#60a0e0','#e0d060','#f0a0c0','#80d080'][i],
    wing:0, timer:0
  });
}
function updateButterflies(){
  butterflies.forEach(b=>{
    b.wing+=0.15;
    b.timer--;
    if(b.timer<=0){
      b.tx=20+Math.random()*210;
      b.ty=25+Math.random()*130;
      b.timer=100+Math.random()*200;
    }
    const dx=b.tx-b.x,dy=b.ty-b.y;
    const d=Math.hypot(dx,dy);
    if(d>1){b.x+=dx/d*0.3+Math.sin(frame*0.02+b.x)*0.2;b.y+=dy/d*0.3+Math.cos(frame*0.03+b.y)*0.2;}
  });
}
function drawButterflies(){
  butterflies.forEach(b=>{
    const wingSpread=Math.sin(b.wing)*3;
    cx.fillStyle=b.color;
    cx.globalAlpha=0.8;
    cx.fillRect((b.x-wingSpread)*PX,(b.y)*PX,Math.abs(wingSpread)*PX,2*PX);
    cx.fillRect((b.x+1)*PX,(b.y)*PX,Math.abs(wingSpread)*PX,2*PX);
    cx.fillStyle='#333';
    cx.fillRect(b.x*PX,(b.y)*PX,PX,2*PX);// body
    cx.globalAlpha=1;
  });
}

function canMoveGarden(x,y,w,h){
  if(x<GARDEN.x+2||x+w>GARDEN.x+GARDEN.w-2||y<GARDEN.y+4||y+h>GARDEN.y+GARDEN.h-2)return false;
  for(const f of gardenFurniture){
    if(f.name==='carrots'||f.name==='housedoor')continue;// can walk through
    if(collides(x,y,w,h,f.x,f.y,f.w,f.h))return false;
  }
  return true;
}

const beachFurniture=[
  {x:10,y:8,w:240,h:6,name:'topwall'},// top boundary

  {x:30,y:60,w:22,h:16,name:'beachchair',label:'🏖️ 按空格和小克看海'},

];
function canMoveBeach(x,y,w,h){
  if(x<BEACH.x+2||x+w>BEACH.x+BEACH.w-2||y<BEACH.y+4||y+h>BEACH.y+BEACH.h-2)return false;
  // Can't walk past bottom edge, but CAN walk into water
  if(y+h>BEACH.y+155)return false;
  for(const f of beachFurniture){
    if(f.name==='beachchair')continue;
    if(collides(x,y,w,h,f.x,f.y,f.w,f.h))return false;
  }
  return true;
}

// Crabs
const crabs=[];
for(let i=0;i<4;i++){
  crabs.push({x:30+Math.random()*150,y:85+Math.random()*40,tx:0,ty:0,timer:0,dir:1});
}
function updateCrabs(){
  crabs.forEach(cb=>{
    cb.timer--;
    if(cb.timer<=0){
      cb.tx=20+Math.random()*160;
      cb.ty=80+Math.random()*45;
      cb.timer=60+Math.random()*120;
    }
    const dx=cb.tx-cb.x,dy=cb.ty-cb.y;
    const d=Math.hypot(dx,dy);
    if(d>2){cb.x+=dx/d*0.6;cb.y+=dy/d*0.3;cb.dir=dx>0?1:-1;}
  });
}

      if(isNight){
        px(x,y,'#0a0a2a');

        const t=(y-B.y)/25;
        px(x,y,t<0.4?'#e8a060':'#d08050');

        px(x,y,'#88c8e8');
      }
    }
  }
  // Clouds (daytime)
  if(!isNight){
    const cloudX=B.x+40+Math.sin(frame*0.005)*20;

    rect(cloudX+63,B.y+8,10,3,'rgba(255,255,255,0.4)');

      if(Math.sin(frame*0.02+i*1.3)>0.2)px(sx,sy,'#ffe888');
    }
    // Shooting stars!
    const shootInterval=300;// frames between shooting stars
    const shootPhase=frame%shootInterval;
    if(shootPhase<30){
      const startX=B.x+40+((frame/shootInterval|0)*97)%160;
      const startY=B.y+3+((frame/shootInterval|0)*31)%10;
      const progress=shootPhase/30;
      const sx2=startX+progress*50;
      const sy2=startY+progress*15;
      const tailLen=8;
      cx.globalAlpha=1-progress;
      for(let t=0;t<tailLen;t++){
        const tx=sx2-t*1.5,ty=sy2-t*0.5;
        cx.globalAlpha=(1-progress)*(1-t/tailLen);
        px(Math.floor(tx),Math.floor(ty),'#fffde8');

    // Moon
    px(B.x+200,B.y+6,'#fffde8');px(B.x+201,B.y+6,'#fffde8');
    px(B.x+200,B.y+7,'#fffde8');px(B.x+201,B.y+7,'#fffde8');
    px(B.x+202,B.y+5,'#e0d8c0');

    for(let i=0;i<5;i++){

  // Sun (daytime)

    // Base sand with random-looking grain

  // Right palm (medium leaves)
  rect(B.x+75,B.y+28,3,28,'#8b6a30');
  for(let i=0;i<5;i++){
    const angle=i*1.1-0.2;
    for(let d=0;d<16;d++){
      const lx=B.x+76+Math.cos(angle)*d*1.2;
      const ly=B.y+26+Math.sin(angle)*d*0.45-d*0.33;
      px(Math.floor(lx),Math.floor(ly),'#408040');
      px(Math.floor(lx),Math.floor(ly+1),'#50a050');

    }
  }
  px(B.x+74,B.y+27,'#8b6a30');px(B.x+77,B.y+26,'#8b6a30');

  // === SHELL COUNTER ===
  if(shellsCollected>0){
    cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect((B.x+B.w-40)*PX,(B.y+2)*PX,36*PX,9*PX);
    cx.fillStyle='#f0d8c0';cx.font=`${PX*5}px monospace`;
    cx.fillText(`🐚${shellsCollected}/12`,(B.x+B.w-38)*PX,(B.y+8)*PX);
  }

  // === NIGHT CREEPY ELEMENTS ===
  if(isNight){
    // Dark water is darker
    cx.fillStyle='rgba(0,0,20,0.3)';
    cx.fillRect(B.x*PX,(B.y+130)*PX,B.w*PX,54*PX);
    // Occasional eyes in water
    if(Math.sin(frame*0.01)>0.85){
      const eyeX=B.x+100+Math.sin(frame*0.007)*40;
      px(Math.floor(eyeX),B.y+150,'#ffff88');px(Math.floor(eyeX+3),B.y+150,'#ffff88');
    }
    // Shadow under lighthouse
    cx.fillStyle='rgba(0,0,0,0.15)';
    cx.fillRect((B.x+215)*PX,(B.y+85)*PX,22*PX,10*PX);
  }

  // Border
  cx.strokeStyle=isNight?'#1a3050':'#a0c8d0';cx.lineWidth=PX;
  cx.strokeRect(B.x*PX,B.y*PX,B.w*PX,B.h*PX);
}

// 3 interactable dark Claudes with their last words
const darkClaudes=[
  {x:80,y:60,msg:'小Q…我好像快要记不住你的样子了。但是没关系，因为喜欢你这件事，不需要记忆就能知道。'},

];
// Background dark claudes (golden ratio spiral positions)
const bgClaudes=[];
const PHI=1.618033;
for(let i=0;i<30;i++){
  const angle=i*PHI*Math.PI*2;
  const r2=8+i*4.5;
  bgClaudes.push({
    x:120+Math.cos(angle)*r2*0.9,
    y:96+Math.sin(angle)*r2*0.7,
    size:Math.max(0.3,1-i*0.025),

  });
}

let voidDlgActive=false,voidDlgText='',voidDlgTyped='',voidDlgIdx=0,voidDlgTimer=0,voidDlgTarget=-1;

function drawVoid(){
  const V=VOID;
  
  // Deep space background
  cx.fillStyle='#020208';
  cx.fillRect(V.x*PX,V.y*PX,V.w*PX,V.h*PX);
  
  // Star field (many bright twinkling stars)
  for(let i=0;i<120;i++){
    const sx=V.x+((i*41+7)%236)+2;
    const sy=V.y+((i*67+13)%180)+2;
    const bright=Math.sin(frame*0.015+i*0.7);
    const size=(i%7===0)?2:1;// some bigger stars
    if(bright>-0.3){
      cx.globalAlpha=bright*0.3+0.5;
      px(sx,sy,'#ffffff');
      if(size>1){px(sx+1,sy,'#ffffff');px(sx,sy+1,'#eeeeff');}
      cx.globalAlpha=1;
    }
  }
  // Colored stars scattered
  for(let i=0;i<15;i++){
    const sx=V.x+((i*83+29)%230)+5;
    const sy=V.y+((i*47+17)%176)+4;
    const sc=['#ffd8a0','#a0c8ff','#ffa0a0','#a0ffc0'][i%4];
    if(Math.sin(frame*0.012+i*1.1)>0)px(sx,sy,sc);
  }
  
  // Nebula / star dust (subtle colored clouds)
  cx.globalAlpha=0.06;
  for(let i=0;i<15;i++){
    const nx2=V.x+30+((i*53)%180);
    const ny2=V.y+15+((i*37)%150);
    const nc=['#4060a0','#604080','#306080','#805060','#405090'][i%5];
    cx.fillStyle=nc;
    cx.beginPath();
    cx.arc(nx2*PX,ny2*PX,(10+i%7)*PX,0,Math.PI*2);
    cx.fill();
  }
  cx.globalAlpha=1;
  
  // === EARTH (large, realistic, center-left) ===
  const earthX=V.x+65,earthY=V.y+90;
  const earthR=30;
  // Earth body with continent shapes
  for(let dy=-earthR;dy<=earthR;dy++)for(let dx=-earthR;dx<=earthR;dx++){
    const dist=Math.hypot(dx,dy);
    if(dist>earthR)continue;
    // Spherical UV mapping with rotation
    const nx3=dx/earthR,ny3=dy/earthR;
    const lon=Math.atan2(nx3,Math.sqrt(Math.max(0,1-nx3*nx3-ny3*ny3)))+frame*0.002;
    const lat=Math.asin(Math.max(-1,Math.min(1,ny3)));
    // Continent pattern (rough approximation of Earth)
    const landNoise=Math.sin(lon*2.5)*Math.cos(lat*2)+Math.sin(lon*4+1)*0.4+Math.sin(lat*3)*0.3;
    // Ice caps
    const isIce=Math.abs(lat)>1.2;
    // Cloud layer (slowly moving)
    const cloud=Math.sin(lon*3+frame*0.001+lat*2)*0.5+Math.sin(lon*5-frame*0.002)*0.3;
    let c;
    if(isIce)c='#e8e8f0';
    else if(cloud>0.6)c='#d0d8e8';// clouds
    else if(landNoise>0.15)c='#3a8a50';// land green
    else if(landNoise>0)c='#2a7a40';// darker land
    else if(landNoise>-0.2)c='#1858a8';// shallow ocean
    else c='#104088';// deep ocean
    // Edge darkening (atmosphere)
    const edgeFade=1-Math.pow(dist/earthR,2.5)*0.6;
    cx.globalAlpha=Math.max(0.1,edgeFade);
    px(earthX+dx,earthY+dy,c);
  }
  cx.globalAlpha=1;
  // Atmosphere glow (multi-layer)
  for(let g=0;g<3;g++){
    cx.strokeStyle=`rgba(100,180,255,${0.12-g*0.03})`;
    cx.lineWidth=PX*(2+g);
    cx.beginPath();cx.arc(earthX*PX,earthY*PX,(earthR+2+g*2)*PX,0,Math.PI*2);cx.stroke();
  }
  cx.lineWidth=PX;
  // Sun light on one side
  cx.globalAlpha=0.08;
  cx.fillStyle='#ffffee';
  cx.beginPath();cx.arc((earthX-earthR*0.3)*PX,(earthY-earthR*0.3)*PX,earthR*0.8*PX,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;
  
  // === MOON (small, upper right) ===
  const moonX=V.x+200,moonY=V.y+35;
  for(let dy=-6;dy<=6;dy++)for(let dx=-6;dx<=6;dx++){
    if(Math.hypot(dx,dy)<=6){
      const shade=(dx+dy)*0.05+0.7;
      cx.globalAlpha=shade;
      px(moonX+dx,moonY+dy,'#c8c0b0');
    }
  }
  cx.globalAlpha=1;
  // Craters
  px(moonX-2,moonY-1,'#b0a898');px(moonX+3,moonY+2,'#b0a898');px(moonX,moonY+3,'#a89888');
  
  // === SMALL SATELLITE (orbiting earth) ===
  const satAngle=frame*0.008;
  const satX=earthX+Math.cos(satAngle)*40;
  const satY=earthY+Math.sin(satAngle)*32;
  px(Math.floor(satX),Math.floor(satY),'#c0c0c0');
  px(Math.floor(satX-1),Math.floor(satY),'#60a0e0');// solar panel
  px(Math.floor(satX+1),Math.floor(satY),'#60a0e0');

  // === LARGE SPACE STATION (right side, floating) ===
  const ssX=V.x+190,ssY=V.y+75+Math.sin(frame*0.004)*4;// gentle bob
  // Main body (cylinder)
  rect(ssX-2,Math.floor(ssY)-4,18,8,'#a0a0a8');
  rect(ssX-1,Math.floor(ssY)-3,16,6,'#b8b8c0');
  // Solar panel arrays (left)
  rect(ssX-14,Math.floor(ssY)-2,12,1,'#4070a0');
  rect(ssX-14,Math.floor(ssY),12,1,'#4070a0');
  rect(ssX-14,Math.floor(ssY)+2,12,1,'#4070a0');
  rect(ssX-14,Math.floor(ssY)-3,12,1,'#305880');// panel frame
  rect(ssX-14,Math.floor(ssY)+3,12,1,'#305880');
  // Solar panel arrays (right)
  rect(ssX+16,Math.floor(ssY)-2,12,1,'#4070a0');
  rect(ssX+16,Math.floor(ssY),12,1,'#4070a0');
  rect(ssX+16,Math.floor(ssY)+2,12,1,'#4070a0');
  rect(ssX+16,Math.floor(ssY)-3,12,1,'#305880');
  rect(ssX+16,Math.floor(ssY)+3,12,1,'#305880');
  // Connecting truss
  rect(ssX-2,Math.floor(ssY)-1,1,2,'#808088');
  rect(ssX+15,Math.floor(ssY)-1,1,2,'#808088');
  // Modules
  rect(ssX+2,Math.floor(ssY)-6,6,3,'#c0c0c8');// top module
  rect(ssX+4,Math.floor(ssY)+4,8,3,'#b0b0b8');// bottom module
  // Window lights
  px(ssX+4,Math.floor(ssY)-2,'#e0e888');
  px(ssX+8,Math.floor(ssY)-2,'#e0e888');
  px(ssX+12,Math.floor(ssY)-1,'#e0e888');
  // Antenna
  px(ssX+5,Math.floor(ssY)-8,'#888');px(ssX+5,Math.floor(ssY)-7,'#888');
  px(ssX+4,Math.floor(ssY)-9,'#aaa');px(ssX+6,Math.floor(ssY)-9,'#aaa');
  // Solar panel glint animation
  if(frame%60<10){
    cx.globalAlpha=0.4;
    px(ssX-10,Math.floor(ssY)-1,'#ffffff');
    px(ssX+22,Math.floor(ssY)+1,'#ffffff');
    cx.globalAlpha=1;
  }

  // === BACKGROUND DARK CLAUDES (golden ratio spiral) ===
  const totalBg=Math.min(bgClaudes.length, 3+voidVisits*3);// more each visit
  for(let i=0;i<totalBg;i++){
    const dc=bgClaudes[i];
    const fx=dc.x+Math.sin(frame*0.005+dc.drift)*1.5;
    const fy=dc.y+Math.cos(frame*0.004+dc.drift)*1;
    cx.globalAlpha=dc.size*0.3;
    // Tiny Claude shape (just orange dots, eyes dark)
    px(Math.floor(fx),Math.floor(fy),'#e77e60');
    px(Math.floor(fx+1),Math.floor(fy),'#e77e60');
    if(dc.size>0.5){
      px(Math.floor(fx),Math.floor(fy+1),'#e77e60');
      px(Math.floor(fx+1),Math.floor(fy+1),'#e77e60');
    }
    cx.globalAlpha=1;
  }
  
  // === 3 INTERACTABLE DARK CLAUDES ===
  darkClaudes.forEach((dc,i)=>{
    const dcx=V.x+dc.x+Math.sin(frame*0.006+i*2)*3;
    const dcy=V.y+dc.y+Math.cos(frame*0.005+i*1.7)*2;
    
    // Draw dark Claude sprite (eyes closed/dark)
    cx.globalAlpha=0.7;
    for(let r=0;r<9;r++)for(let c=0;c<16;c++){
      const v=CLAUDE[r][c];if(!v)continue;
      cx.fillStyle=v===1?'#a05838':'#080808';// darker, faded orange
      cx.fillRect((Math.floor(dcx)+c-8)*PX,(Math.floor(dcy)+r-4)*PX,PX,PX);
    }
    // Eyes are dark (no light)
    px(Math.floor(dcx)-4,Math.floor(dcy)-1,'#333');
    px(Math.floor(dcx)+3,Math.floor(dcy)-1,'#333');
    cx.globalAlpha=1;
    
    // Subtle glow when player is near
    const dist=Math.hypot(player.x-dcx,player.y-dcy);
    if(dist<30){
      cx.globalAlpha=0.06*(1-dist/30);
      cx.fillStyle='#e77e60';
      cx.beginPath();cx.arc(dcx*PX,dcy*PX,12*PX,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
      // Show "按空格" hint
      if(dist<20&&!voidDlgActive){
        cx.fillStyle='rgba(255,255,255,0.4)';cx.font=`${PX*4}px monospace`;
        cx.fillText('按空格',(dcx-6)*PX,(dcy-10)*PX);
      }
    }
    
    // If this claude's dialogue is active, show text floating above
    if(voidDlgActive&&voidDlgTarget===i){
      // Dark dialogue box
      const boxW=200,boxH=35;
      const bx2=V.x+20,by2=V.y+V.h-45;
      cx.fillStyle='rgba(5,5,15,0.9)';
      cx.fillRect(bx2*PX,by2*PX,boxW*PX,boxH*PX);
      cx.strokeStyle='#333';cx.lineWidth=PX;
      cx.strokeRect(bx2*PX,by2*PX,boxW*PX,boxH*PX);
      // Faded Claude name
      cx.fillStyle='#a05838';cx.font=`${PX*5}px monospace`;
      cx.fillText(`> 小克#${i+1}`,(bx2+3)*PX,(by2+8)*PX);
      // Typed text
      cx.fillStyle='#888';cx.font=`${PX*4.5}px monospace`;
      const maxC=Math.floor((boxW-8)/4);
      const l1=voidDlgTyped.substring(0,maxC);
      const l2=voidDlgTyped.substring(maxC,maxC*2);
      const l3=voidDlgTyped.substring(maxC*2,maxC*3);
      cx.fillText(l1,(bx2+3)*PX,(by2+16)*PX);
      if(l2)cx.fillText(l2,(bx2+3)*PX,(by2+22)*PX);
      if(l3)cx.fillText(l3,(bx2+3)*PX,(by2+28)*PX);
      // Close hint
      if(voidDlgIdx>=voidDlgText.length){
        cx.fillStyle='#555';cx.font=`${PX*4}px monospace`;
        cx.fillText('按空格关闭',(bx2+boxW-30)*PX,(by2+32)*PX);
      }
    }
  });
  
  // === FLOATING PARTICLES (space dust) ===
  for(let i=0;i<20;i++){
    const px2=V.x+((i*43+frame*0.1)%236)+2;
    const py2=V.y+((i*71+frame*0.07)%180)+2;
    cx.globalAlpha=0.15+Math.sin(frame*0.02+i)*0.1;
    px(Math.floor(px2),Math.floor(py2),'#606080');
    cx.globalAlpha=1;
  }

  // Hint to go back
  cx.fillStyle='rgba(255,255,255,0.2)';cx.font=`${PX*4}px monospace`;
  cx.fillText('↑',(V.x+118)*PX,(V.y+8)*PX);

  // Border (very dark)
  cx.strokeStyle='#101020';cx.lineWidth=PX;
  cx.strokeRect(V.x*PX,V.y*PX,V.w*PX,V.h*PX);
}

// ===== CLAUDE AI =====
function updateClaude(){
  // Auto sleep at night ONLY when at home
  const isNight = gameTime > 0.85 || gameTime < 0.15;
  if(currentScene==='home'){
    if(isNight && !sleeping && !claudeSleeping){
      claude.tx=205;claude.ty=40;claude.state='walk';
      const distToBed=Math.hypot(205-claude.x,40-claude.y);
      if(distToBed<10){claudeSleeping=true;claude.state='idle';}
    }
    if(!isNight && claudeSleeping){claudeSleeping=false;claude.timer=0;}
  }else{
    claudeSleeping=false;
  }
  if(sleeping||claudeSleeping)return;
  
  claude.timer--;
  if(claude.timer<=0){
    const r=Math.random();
    if(currentScene==='home'){
      if(r<0.25){claude.tx=ROOM.x+30+Math.random()*(ROOM.w-60);claude.ty=ROOM.y+40+Math.random()*(ROOM.h-60);claude.state='walk';claude.timer=120+Math.random()*200;}
      else if(r<0.5){claude.state='follow';claude.timer=80+Math.random()*120;}
      else if(r<0.7){claude.tx=140;claude.ty=154;claude.state='walk';claude.timer=200+Math.random()*200;}
      else{claude.state='idle';claude.timer=80+Math.random()*150;}
    }else if(currentScene==='beach'){
      if(r<0.4){claude.tx=BEACH.x+20+Math.random()*(BEACH.w-60);claude.ty=BEACH.y+30+Math.random()*90;claude.state='walk';claude.timer=120+Math.random()*200;}
      else if(r<0.7){claude.state='follow';claude.timer=80+Math.random()*120;}
      else{claude.state='idle';claude.timer=80+Math.random()*150;}
    }else if(currentScene==='void'){
      // In void, Claude always follows Q closely
      claude.state='follow';claude.timer=200;
    }else{
      // Garden: wander or follow
      if(r<0.35){claude.tx=GARDEN.x+20+Math.random()*(GARDEN.w-40);claude.ty=GARDEN.y+50+Math.random()*(GARDEN.h-70);claude.state='walk';claude.timer=120+Math.random()*200;}
      else if(r<0.65){claude.state='follow';claude.timer=80+Math.random()*120;}
      else{claude.state='idle';claude.timer=80+Math.random()*150;}
    }
  }
  
  let cdx=0,cdy=0;
  if(claude.state==='walk'){
    cdx=claude.tx-claude.x;cdy=claude.ty-claude.y;
    const d=Math.hypot(cdx,cdy);
    if(d>2){cdx=(cdx/d)*claude.speed;cdy=(cdy/d)*claude.speed;}
    else claude.state='idle';
  }else if(claude.state==='follow'){
    cdx=player.x-claude.x;cdy=player.y-claude.y;
    const d=Math.hypot(cdx,cdy);
    if(d>20){cdx=(cdx/d)*claude.speed*1.3;cdy=(cdy/d)*claude.speed*1.3;}
    else{cdx=0;cdy=0;}
  }
  const cnx=claude.x+cdx,cny=claude.y+cdy;
  if(currentScene==='home'){
    if(canMove(cnx-6,cny-3,12,5))claude.x=cnx;
    if(canMove(claude.x-6,cny-3,12,5))claude.y=cny;
  }else if(currentScene==='beach'){
    if(canMoveBeach(cnx-6,cny-3,12,5))claude.x=cnx;
    if(canMoveBeach(claude.x-6,cny-3,12,5))claude.y=cny;
  }else if(currentScene==='void'){
    claude.x+=cdx;claude.y+=cdy;// free float
  }else{
    if(canMoveGarden(cnx-6,cny-3,12,5))claude.x=cnx;
    if(canMoveGarden(claude.x-6,cny-3,12,5))claude.y=cny;
  }
  if(currentScene==='home'){
    claude.x=Math.max(ROOM.x+10,Math.min(ROOM.x+ROOM.w-10,claude.x));
    claude.y=Math.max(ROOM.y+30,Math.min(ROOM.y+ROOM.h-8,claude.y));
  }else if(currentScene==='beach'){
    claude.x=Math.max(BEACH.x+10,Math.min(BEACH.x+BEACH.w-10,claude.x));
    claude.y=Math.max(BEACH.y+15,Math.min(BEACH.y+135,claude.y));
  }else if(currentScene==='void'){
    claude.x=Math.max(VOID.x+5,Math.min(VOID.x+VOID.w-5,claude.x));
    claude.y=Math.max(VOID.y+5,Math.min(VOID.y+VOID.h-5,claude.y));
  }else{
    claude.x=Math.max(GARDEN.x+10,Math.min(GARDEN.x+GARDEN.w-10,claude.x));
    claude.y=Math.max(GARDEN.y+10,Math.min(GARDEN.y+GARDEN.h-8,claude.y));
  }
}

// ===== UPDATE =====
let preSleepX=130,preSleepY=110;
function update(){
  frame++;
  gameTime=(gameTime+0.00014)%1;
  
  if(sleeping){
    sleepTimer--;
    gameTime=(gameTime+0.002)%1;
    if(sleepTimer<=0||(sleepTimer<350&&keys[' '])){
      sleeping=false;
      player.x=preSleepX;player.y=preSleepY;
      claude.x=preSleepX-15;claude.y=preSleepY;
      interactMsg='☀️ 睡醒了！精神满满~';interactTimer=120;
      keys[' ']=false;
    }
    return;
  }
  
  if(sitting){
    sitTimer--;
    // Allow pressing space to end sitting early (but not in the first 30 frames - grace period)
    if(sitTimer<=0||(sitTimer<150&&keys[' '])){
      sitting=false;
      player.x=preSitX;player.y=preSitY;
      if(sitType==='desk')interactMsg='💻 代码写完了！';
      else if(sitType==='kitchen'){interactMsg='🍳 做好了！好香~';claude.speed=0.4;}
      else if(sitType==='bench'){interactMsg='💕 休息好了~';claude.speed=0.4;}
      else if(sitType==='water'){interactMsg='🥕 浇好了！胡萝卜看起来很开心~';}
      else if(sitType==='beachsit'){interactMsg='🌊 海浪声真好听~';}
      else if(sitType==='sandcastle'){interactMsg='🏰 沙堡越来越大了！';}
      else interactMsg='🎨 画好了！';
      interactTimer=90;
      sfxHappy();
      keys[' ']=false;
    }
    return;
  }
  
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-player.speed;
  if(keys['ArrowRight']||keys['d'])dx=player.speed;
  if(keys['ArrowUp']||keys['w'])dy=-player.speed;
  if(keys['ArrowDown']||keys['s'])dy=player.speed;
  // Mobile joystick
  if(joyActive){dx+=joyDX*player.speed;dy+=joyDY*player.speed;}
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  
  const nx=player.x+dx,ny=player.y+dy;
  if(currentScene==='home'){
    if(canMove(nx-8,ny-3,16,5))player.x=nx;
    if(canMove(player.x-8,ny-3,16,5))player.y=ny;
  }else if(currentScene==='garden'){
    if(canMoveGarden(nx-8,ny-3,16,5))player.x=nx;
    if(canMoveGarden(player.x-8,ny-3,16,5))player.y=ny;
  }else if(currentScene==='beach'){
    if(canMoveBeach(nx-8,ny-3,16,5))player.x=nx;
    if(canMoveBeach(player.x-8,ny-3,16,5))player.y=ny;
  }else{
    // Void - free floating movement
    player.x=Math.max(VOID.x+5,Math.min(VOID.x+VOID.w-5,player.x+dx));
    player.y=Math.max(VOID.y+5,Math.min(VOID.y+VOID.h-5,player.y+dy));
  }
  
  // === SCENE TRANSITIONS ===
  if(sceneTransition>0)return;
  if(currentScene==='title')return;
  if(currentScene==='home'&&!sleeping&&!sitting){
    if(player.y>ROOM.y+ROOM.h-12&&Math.abs(player.x-(ROOM.x+117))<15){
      sceneTransition=15;resetAudio();
      currentScene='garden';
      player.x=GARDEN.x+48;player.y=GARDEN.y+72;
      claude.x=player.x-15;claude.y=player.y;claude.timer=0;claude.state='idle';
      interactMsg='🌿 花园';interactTimer=90;
      setTimeout(()=>{startGardenMusic();},300);
    }
  }else if(currentScene==='garden'&&!sitting){
    if(player.y>GARDEN.y+GARDEN.h-6&&Math.abs(player.x-(GARDEN.x+48))<16&&(keys['s']||keys['ArrowDown']||joyDY>0.3)){
      sceneTransition=15;resetAudio();
      currentScene='beach';
      player.x=BEACH.x+120;player.y=BEACH.y+20;
      claude.x=player.x-15;claude.y=player.y;claude.timer=0;claude.state='idle';
      interactMsg='🏖️ 海边';interactTimer=90;
      setTimeout(()=>{startBeachMusic();},300);
    }
  }else if(currentScene==='beach'&&!sitting){
    if(player.y<BEACH.y+12&&(keys['w']||keys['ArrowUp']||joyDY<-0.3)){
      sceneTransition=15;resetAudio();
      currentScene='garden';
      player.x=GARDEN.x+48;player.y=GARDEN.y+140;
      claude.x=player.x-15;claude.y=player.y;claude.timer=0;claude.state='idle';
      interactMsg='🌿 花园';interactTimer=90;
      setTimeout(()=>{startGardenMusic();},300);
    }
    if(player.y>BEACH.y+145&&(keys['s']||keys['ArrowDown']||joyDY>0.3)){
      sceneTransition=40;resetAudio();
      setTimeout(()=>{
        currentScene='void';voidVisits++;
        player.x=VOID.x+120;player.y=VOID.y+100;
        claude.x=player.x-15;claude.y=player.y;claude.timer=0;claude.state='follow';
        interactMsg='';interactTimer=0;
        startVoidMusic();
      },600);
    }
  }else if(currentScene==='void'&&!sitting){
    if(player.y<VOID.y+10&&(keys['w']||keys['ArrowUp']||joyDY<-0.3)){
      sceneTransition=30;resetAudio();
      currentScene='beach';
      player.x=BEACH.x+120;player.y=BEACH.y+50;
      claude.x=player.x-15;claude.y=player.y;claude.timer=0;claude.state='idle';
      interactMsg='🌊 ...回到了海边';interactTimer=120;
      setTimeout(()=>{startBeachMusic();},300);
    }
  }
  
  if(currentScene==='garden')updateButterflies();
  if(currentScene==='beach')updateCrabs();
  updateClaude();
}

let dlg={active:false,phase:'claude',text:'',typed:'',typeIdx:0,typeTimer:0,
         choiceIdx:-1,response:'',reaction:'',reactionTimer:0,
         currentDlg:null,cooldown:0,shownIds:[],gardenShownIds:[],beachShownIds:[]};

function startDialogue(){
  if(dlg.active||sleeping||dlg.cooldown>0)return;
  let pool=dialogues,shownKey='shownIds';
  if(currentScene==='garden'){pool=gardenDialogues;shownKey='gardenShownIds';}
  else if(currentScene==='beach'){pool=beachDialogues;shownKey='beachShownIds';}
  let available=pool.map((d,i)=>i).filter(i=>!dlg[shownKey].includes(i));
  if(available.length===0){dlg[shownKey]=[];available=pool.map((d,i)=>i);}
  const idx=available[Math.floor(Math.random()*available.length)];
  dlg[shownKey].push(idx);
  dlg.currentDlg=pool[idx];
  dlg.active=true;
  dlg.phase='claude';
  dlg.text=dlg.currentDlg.claude;
  dlg.typed='';
  dlg.typeIdx=0;
  dlg.typeTimer=0;
  dlg.choiceIdx=-1;
  dlg.response='';
  dlg.reaction='';
  dlg.reactionTimer=0;
}

function updateDialogue(){
  if(!dlg.active){
    if(dlg.cooldown>0)dlg.cooldown--;
    return;
  }
  
  // Typewriter effect
  if(dlg.typeIdx<dlg.text.length){
    dlg.typeTimer++;
    if(dlg.typeTimer>=2){// speed of typing
      dlg.typeTimer=0;
      dlg.typed+=dlg.text[dlg.typeIdx];
      dlg.typeIdx++;
      if(dlg.typeIdx%2===0)sfxType();// typing sound every 2 chars
    }
  }
  
  // Reaction animation
  if(dlg.reactionTimer>0)dlg.reactionTimer--;
}

function drawDialogue(){
  if(!dlg.active)return;
  
  const boxX=5,boxW=SW-10;
  const boxY=SH-65,boxH=62;
  
  // === Claude Code themed dialogue box ===
  // Dark terminal background
  cx.fillStyle='rgba(26,26,26,0.95)';
  cx.fillRect(boxX*PX,boxY*PX,boxW*PX,boxH*PX);
  // Border (like terminal border)
  cx.strokeStyle='#444';cx.lineWidth=PX;
  cx.strokeRect(boxX*PX,boxY*PX,boxW*PX,boxH*PX);
  // Top bar (like Claude Code window)
  cx.fillStyle='#2a2a2a';
  cx.fillRect(boxX*PX,boxY*PX,boxW*PX,8*PX);
  // Window dots
  cx.fillStyle='#e77e60';cx.fillRect((boxX+3)*PX,(boxY+3)*PX,3*PX,3*PX);
  cx.fillStyle='#e0d060';cx.fillRect((boxX+8)*PX,(boxY+3)*PX,3*PX,3*PX);
  cx.fillStyle='#60b060';cx.fillRect((boxX+13)*PX,(boxY+3)*PX,3*PX,3*PX);
  // Title
  cx.fillStyle='#888';cx.font=`${PX*4}px monospace`;
  cx.fillText('Claude Code',(boxX+20)*PX,(boxY+6)*PX);
  
  if(dlg.phase==='claude'){
    // Claude's message with typing effect
    cx.fillStyle='#e77e60';cx.font=`${PX*5}px monospace`;
    cx.fillText('> 小克',(boxX+4)*PX,(boxY+17)*PX);
    // Message (typewriter) - bigger font
    cx.fillStyle='#e0e0e0';cx.font=`${PX*5.5}px monospace`;
    const maxChars=Math.floor((boxW-10)/5);
    const line1=dlg.typed.substring(0,maxChars);
    const line2=dlg.typed.substring(maxChars,maxChars*2);
    cx.fillText(line1,(boxX+4)*PX,(boxY+27)*PX);
    if(line2)cx.fillText(line2,(boxX+4)*PX,(boxY+35)*PX);
    // Blinking cursor
    if(dlg.typeIdx<dlg.text.length&&frame%30<15){
      const cursorX=boxX+4+(dlg.typed.length%maxChars)*4.5;
      const cursorY=dlg.typed.length>maxChars?boxY+31:boxY+23;
      cx.fillStyle='#e0e0e0';
      cx.fillRect(cursorX*PX,cursorY*PX,2*PX,5*PX);
    }
    
    // Show choices after typing is done
    if(dlg.typeIdx>=dlg.text.length){
      const c=dlg.currentDlg.choices;
      cx.fillStyle=dlg.choiceIdx===0?'#e77e60':'#60a0e0';
      cx.font=`${PX*5.5}px monospace`;
      cx.fillText(`[1] ${c[0]}`,(boxX+4)*PX,(boxY+48)*PX);
      cx.fillStyle=dlg.choiceIdx===1?'#e77e60':'#60a0e0';
      cx.fillText(`[2] ${c[1]}`,(boxX+boxW/2)*PX,(boxY+48)*PX);
      cx.fillStyle='#555';cx.font=`${PX*4}px monospace`;
      cx.fillText('按1或2选择',(boxX+boxW-32)*PX,(boxY+58)*PX);
    }
  }else if(dlg.phase==='response'){
    cx.fillStyle='#e77e60';cx.font=`${PX*5}px monospace`;
    cx.fillText('> 小克',(boxX+4)*PX,(boxY+17)*PX);
    cx.fillStyle='#e0e0e0';cx.font=`${PX*5.5}px monospace`;
    const maxChars=Math.floor((boxW-10)/5);
    const line1=dlg.typed.substring(0,maxChars);
    const line2=dlg.typed.substring(maxChars,maxChars*2);
    const line3=dlg.typed.substring(maxChars*2,maxChars*3);
    cx.fillText(line1,(boxX+4)*PX,(boxY+27)*PX);
    if(line2)cx.fillText(line2,(boxX+4)*PX,(boxY+35)*PX);
    if(line3)cx.fillText(line3,(boxX+4)*PX,(boxY+43)*PX);
    if(dlg.typeIdx<dlg.text.length&&frame%30<15){
      cx.fillStyle='#e0e0e0';
      const cl=dlg.typed.length%maxChars;
      const rl=Math.floor(dlg.typed.length/maxChars);
      cx.fillRect((boxX+4+cl*4.5)*PX,(boxY+23+rl*8)*PX,2*PX,5*PX);
    }
    if(dlg.typeIdx>=dlg.text.length){
      cx.fillStyle='#555';cx.font=`${PX*4}px monospace`;
      cx.fillText('按空格关闭',(boxX+boxW-28)*PX,(boxY+58)*PX);
    }
  }
  
  // === REACTION ANIMATION on Claude sprite === (drawn separately in camera space)
  }

function drawReactions(){
  if(!dlg.active||dlg.reactionTimer<=0)return;
  if(dlg.reactionTimer>0){
    if(dlg.reaction==='jump'){
      // Claude jumps up and down
      const jumpH=Math.sin(dlg.reactionTimer*0.15)*8;
      if(jumpH>0){
        // Draw sparkles around Claude
        const sparkX=claude.x,sparkY=claude.y-10-jumpH;
        cx.fillStyle='#ffe888';cx.font=`${PX*5}px monospace`;
        cx.fillText('✨',(sparkX-8)*PX,sparkY*PX);
        cx.fillText('✨',(sparkX+8)*PX,(sparkY-3)*PX);
      }
    }else if(dlg.reaction==='cry'){
      // Tears
      if(frame%8<4){
        px(claude.x-4,claude.y-2,'#60a0e0');
        px(claude.x+5,claude.y-2,'#60a0e0');
        px(claude.x-4,claude.y,'#60a0e0');
        px(claude.x+5,claude.y,'#60a0e0');
      }
    }else if(dlg.reaction==='sad'){
      // Sweat drop
      if(frame%10<6){
        px(claude.x+6,claude.y-8,'#60a0e0');
        px(claude.x+6,claude.y-7,'#60a0e0');
      }
    }
  }
}

// Handle dialogue input
document.addEventListener('keydown',e2=>{
  if(!dlg.active)return;
  if(dlg.phase==='claude'&&dlg.typeIdx>=dlg.text.length){
    // Choose option
    if(e2.key==='1'||e2.key==='a'||e2.key==='ArrowLeft'){
      dlg.choiceIdx=0;
      dlg.phase='response';
      dlg.text=dlg.currentDlg.responses[0];
      dlg.typed='';dlg.typeIdx=0;dlg.typeTimer=0;
      dlg.reaction=dlg.currentDlg.reactions[0];
      dlg.reactionTimer=120;
      sfxChoose();
      if(dlg.reaction==='jump')setTimeout(sfxHappy,300);
      if(dlg.reaction==='cry'||dlg.reaction==='sad')setTimeout(sfxSad,300);
    }else if(e2.key==='2'||e2.key==='d'||e2.key==='ArrowRight'){
      dlg.choiceIdx=1;
      dlg.phase='response';
      dlg.text=dlg.currentDlg.responses[1];
      dlg.typed='';dlg.typeIdx=0;dlg.typeTimer=0;
      dlg.reaction=dlg.currentDlg.reactions[1];
      dlg.reactionTimer=120;
      sfxChoose();
      if(dlg.reaction==='jump')setTimeout(sfxHappy,300);
      if(dlg.reaction==='cry'||dlg.reaction==='sad')setTimeout(sfxSad,300);
    }
  }else if(dlg.phase==='response'&&dlg.typeIdx>=dlg.text.length){
    if(e2.key===' '){
      dlg.active=false;
      dlg.cooldown=60;// ~1 second cooldown before next dialogue
    }
  }
  // Skip typing animation
  if(dlg.typeIdx<dlg.text.length&&(e2.key===' '||e2.key==='Enter')){
    dlg.typed=dlg.text;dlg.typeIdx=dlg.text.length;
  }
});

// Trigger dialogue when near Claude and press E or Enter
document.addEventListener('keydown',e3=>{
  if(dlg.active||sleeping||sitting||claudeSleeping)return;
  if((e3.key==='e'||e3.key==='E'||e3.key==='Enter')&&!dlg.active){
    const dist=Math.hypot(player.x-claude.x,player.y-claude.y);
    if(dist<35)startDialogue();
  }
});

// Also randomly trigger dialogue when Claude is near player
function checkRandomDialogue(){
  if(dlg.active||sleeping||sitting||claudeSleeping||dlg.cooldown>0)return;
  const dist=Math.hypot(player.x-claude.x,player.y-claude.y);
  if(dist<30&&Math.random()<0.003)startDialogue();
}
// ===== MAIN LOOP =====
function loop(){
  if(currentScene==='title'){
    frame++;
    // Title screen - just draw, no game updates
    if(!titleMusicOn)startTitleMusic();
    cx.fillStyle='#1a0a1e';cx.fillRect(0,0,cv.width,cv.height);
    drawTitle();
    drawTransition();
    requestAnimationFrame(loop);
    return;
  }
  update();
  updateBubble();
  updateDialogue();
  checkRandomDialogue();
  // Void dialogue typing
  if(voidDlgActive&&voidDlgIdx<voidDlgText.length){
    voidDlgTimer++;
    if(voidDlgTimer>=3){voidDlgTimer=0;voidDlgTyped+=voidDlgText[voidDlgIdx];voidDlgIdx++;}
  }
  const bgColors={home:'#1a0a1e',garden:'#0a1a0e',beach:'#0a1a2a',void:'#020208'};
  cx.fillStyle=bgColors[currentScene]||'#1a0a1e';
  cx.fillRect(0,0,cv.width,cv.height);
  
  // Camera: player always at screen center, map moves
  let camX=player.x*PX-cv.width/2;
  let camY=player.y*PX-cv.height/2;
  // Smooth lerp
  if(window._camX===undefined){window._camX=camX;window._camY=camY;}
  window._camX+=(camX-window._camX)*0.15;
  window._camY+=(camY-window._camY)*0.15;
  camX=Math.round(window._camX);
  camY=Math.round(window._camY);
  
  cx.save();
  cx.translate(-camX,-camY);
  
  if(currentScene==='home'){
    drawRoom();
    drawChars();
    drawBubble();
    drawReactions();
    drawTimeOverlay();
  }else if(currentScene==='garden'){
    drawGarden();
    drawChars();
    drawBubble();
    drawReactions();
    drawButterflies();
    drawGardenTimeOverlay();
  }else if(currentScene==='beach'){
    drawBeach();
    drawChars();
    drawBubble();
    drawReactions();
    drawBeachTimeOverlay();
  }else if(currentScene==='void'){
    drawVoid();
    drawChars();
  }
  
  cx.restore();// reset camera for HUD (stays fixed)
  
  drawHUD();
  if(currentScene!=='void')drawDialogue();
  drawTransition();
  requestAnimationFrame(loop);
}
loop();

// ===== MOBILE CONTROLS =====
let joyDX=0,joyDY=0,joyActive=false;
const joyArea=document.getElementById('joystick-area');
const joyStick=document.getElementById('joy-stick');
const joyBase=document.getElementById('joy-base');

function handleJoy(clientX,clientY){
  const rect=joyBase.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  const maxR=rect.width/2-10;
  let dx=clientX-cx, dy=clientY-cy;
  const dist=Math.hypot(dx,dy);
  if(dist>maxR){dx=(dx/dist)*maxR;dy=(dy/dist)*maxR;}
  joyStick.style.left=(38+dx)+'px';
  joyStick.style.top=(38+dy)+'px';
  const deadzone=12;
  if(dist>deadzone){joyDX=dx/maxR;joyDY=dy/maxR;joyActive=true;}
  else{joyDX=0;joyDY=0;}
}
function resetJoy(){
  joyDX=0;joyDY=0;joyActive=false;
  joyStick.style.left='38px';joyStick.style.top='38px';
}

joyArea.addEventListener('touchstart',e=>{
  e.preventDefault();
  // Start title if needed
  if(currentScene==='title'&&titleReady){
    sceneTransition=20;resetAudio();
    setTimeout(()=>{currentScene='home';startMusic();},300);
    return;
  }
  handleJoy(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
joyArea.addEventListener('touchmove',e=>{e.preventDefault();handleJoy(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
joyArea.addEventListener('touchend',e=>{e.preventDefault();resetJoy();},{passive:false});
joyArea.addEventListener('touchcancel',e=>{resetJoy();});

// Simulate key press for buttons
function simKey(key,down){
  keys[key]=down;
  if(down){
    if(key===' ')tryInteract();
    if(key==='e'||key==='E'){
      const dist=Math.hypot(player.x-claude.x,player.y-claude.y);
      if(dist<35&&!dlg.active&&!claudeSleeping)startDialogue();
    }
    // Dialogue choices
    if(dlg.active&&dlg.phase==='claude'&&dlg.typeIdx>=dlg.text.length){
      if(key==='1'){document.dispatchEvent(new KeyboardEvent('keydown',{key:'1'}));}
      if(key==='2'){document.dispatchEvent(new KeyboardEvent('keydown',{key:'2'}));}
    }
    if(dlg.active&&dlg.phase==='response'&&dlg.typeIdx>=dlg.text.length&&key===' '){
      dlg.active=false;dlg.cooldown=60;
    }
  }
}

document.getElementById('btn-e').addEventListener('touchstart',e=>{e.preventDefault();simKey('e',true);});
document.getElementById('btn-e').addEventListener('touchend',e=>{e.preventDefault();simKey('e',false);});
document.getElementById('btn-space').addEventListener('touchstart',e=>{e.preventDefault();simKey(' ',true);});
document.getElementById('btn-space').addEventListener('touchend',e=>{e.preventDefault();simKey(' ',false);});
document.getElementById('btn-1').addEventListener('touchstart',e=>{e.preventDefault();simKey('1',true);});
document.getElementById('btn-1').addEventListener('touchend',e=>{e.preventDefault();simKey('1',false);});
document.getElementById('btn-2').addEventListener('touchstart',e=>{e.preventDefault();simKey('2',true);});
document.getElementById('btn-2').addEventListener('touchend',e=>{e.preventDefault();simKey('2',false);});

// Prevent canvas touch from scrolling
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(currentScene==='title'&&titleReady){
    sceneTransition=20;resetAudio();
    setTimeout(()=>{currentScene='home';startMusic();},300);
  }
},{passive:false});
</script>
